openapi: 3.0.3
info:
  title: IntegratedPaytestAPI
  contact:
    name: Support
    email: support@paytestlab.com
  version: 1.0.2
servers:
  - url: https://127.0.0.1:[port]
tags:
  - name: transaction
    description: Used for controlling transactions
  - name: status
    description: Used to get terminal status

paths:
  /transaction/start:
    post:
      tags:
        - transaction
      summary: Starts a transaction
      parameters:
        - name: X-TestRun-Id
          in: header
          required: false
          schema:
            type: string
          description: Optional identifier for the test run
        - name: X-TestCase-Id
          in: header
          required: false
          schema:
            type: string
          description: Optional identifier for the test case
      requestBody:
        description: Starts a new transaction and provides a callback URL for transaction completion notification
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTransactionRequest'
      responses:
        '200':
          description: Transaction started successfully
        '400':
          description: Invalid request
        '500':
          description: Failed to start the transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      callbacks:
        transactionCompleted:
          '{$request.body#/callbackUrl}':
            post:
              summary: Callback for transaction completion notification
              requestBody:
                description: Notification payload containing details of the completed transaction
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/TransactionCompletionNotification'
              responses:
                '204':
                  description: Notification received successfully

  /transaction/abort:
    post:
      tags:
        - transaction
      summary: Aborts a transaction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbortTransactionRequest'
      responses:
        '204':
          description: Transaction aborted successfully
        '500':
          description: Failed to abort the transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status:
    get:
      tags:
        - status
      summary: Get terminal status
      parameters:
      - name: terminalId
        in: query
        required: true
        schema:
          type: string
        description: The unique identifier of the payment terminal.
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '500':
          description: Failed to get status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
                
  /webhooks/register:
    post:
      tags:
        - webhooks
      summary: Register a webhook for terminal event (e.g., terminal state changes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - terminalId
              - event
              - url
              properties:
                terminalId:
                  type: string
                  description: The ID of the terminal to receive updates for
                event:
                  type: string
                  enum: 
                    - terminalStatus
                url:
                  type: string
                  format: uri
                  description: The URL where notifications will be sent
      responses:
        '201':
          description: Webhook registered successfully
        '500':
          description: Failed to subscribe to webhook
      callbacks:
        terminalStatusUpdate:
          "{$request.body#/url}":
            post:
              summary: Webhook notification for terminal status updates
              operationId: terminalStatusUpdateCallback
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/StatusNotification"
              responses:
                '204':
                  description: Notification received successfully

  /webhooks/unregister:
    post:
      tags:
        - webhooks
      summary: Unregister a webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - terminalId
              - event
              properties:
                terminalId:
                  type: string
                  description: The ID of the terminal to remove webhook subscriptions for
                event:
                  type: string
                  enum: 
                    - terminalStatus
      responses:
        '204':
          description: Webhook removed successfully
        '404':
          description: No matching webhook found
        '400':
          description: Invalid request (e.g., missing terminalId)
      
      
components:
  schemas:
    StartTransactionRequest:
      type: object
      required:
        - transactionId
        - terminalId
        - transactionInformation
        - callbackUrl
      properties:
        transactionId:
          type: string
          description: Unique identifier for the transaction provided by the client
          example: "123e4567-e89b-12d3-a456-426614174000"
        terminalId:
          type: string
          description: Terminal ID where the transaction should be started
          example: "26197127"
        transactionInformation:
          $ref: '#/components/schemas/TransactionInformation'
        callbackUrl:
          type: string
          format: uri
          description: URL to notify when the transaction is complete
        callbackTimeoutSeconds:
          type: integer
          minimum: 1
          example: 120
          description: How long (in seconds) the caller will wait for the callback before timing out

    TransactionInformation:
      type: object
      properties:
        transactionType:
          type: string
          enum:
            - Sale
            - Purchase
            - Cashback
            - Refund
            - PreAuthorization
            - OnlineAdvice
            - PurchaseWithCashback
          example: Purchase
        amount:
          $ref: '#/components/schemas/Amount'
        amountTip:
          $ref: '#/components/schemas/Amount'
        amountOther:
          $ref: '#/components/schemas/Amount'
        referenceNumber:
          type: string
          example: "123456789"
        
    
    TransactionCompletionNotification:
      type: object
      required:
        - transactionId
        - transactionStatus
      properties:
        transactionId:
          type: string
          description: Unique identifier for the transaction (from the request)
        transactionStatus:
          type: string
          description: Final status of the transaction
          enum:
            - Success
            - Failed
        authorizedAmount:
          $ref: '#/components/schemas/Amount'
        tenderName:
          type: string
        posEntry:
          type: string
        PANTruncated:
          type: string
        referenceNumber:
          type: string
        receiptMerchant:
          $ref: '#/components/schemas/Receipt'
        receiptCardHolder:
          $ref: '#/components/schemas/Receipt'
        receiptCashRegister:
          $ref: '#/components/schemas/Receipt'
        hostResponse:
          $ref: '#/components/schemas/HostResponse'
    
    Amount:
      type: object
      properties:
        value:
          type: number
          multipleOf: 0.01
          example: 10.22
        currency:
          type: string
          example: EUR
    
    Receipt:
      type: object
      properties:
        content:
          type: string
          description: Plain text of the full receipt
          
    HostResponse:
      type: object
      properties:
        responseCode:
          type: string
          example: "00"
          description: "Host response code (e.g., '00' for approved)"
        responseMessage:
          type: string
          description: Readable message from host (e.g., if responseCode was '00' here it woudld be approved)
        transactionDateTime:
          type: string
          format: date-time
          example: "2025-03-12T14:30:00Z"
          description: Format year-month-dateThour:minutes:secondsTimeZone
          
    
    AbortTransactionRequest:
      type: object
      required:
        - transactionId
      properties:
        transactionId:
          type: string
          description:  Unique identifier for the transaction (from the request)
          example: "123e4567-e89b-12d3-a456-426614174000"

    ErrorResponse:
      required:
        - message
      type: object
      properties:
        message:
          type: string
          example: error message

    Status:
      required:
        - terminalStatus
      type: object
      properties:
        terminalStatus:
          $ref: '#/components/schemas/TerminalStatus'
        ECRStatus:
          $ref: '#/components/schemas/ECRStatus'

    TerminalStatus:
      type: object
      properties:
        displayContent:
          type: string
          example: Present Card

    ECRStatus:
      type: object
      properties:
        displayContent:
          type: string
          example: Follow instructions on the terminal
    
    StatusNotification:
      type: object
      required:
        - terminalId
        - status
        - timestamp
      properties:
        event:
          type: string
          enum:
            - terminalStatus
        terminalId:
          type: string
          description: The ID of the terminal
        status:
          type: string
          enum: 
            - idle
            - activated
            - pinEntry
            - waitingForCard
            - disconnected
          description: Current status of the terminal
        timestamp:
          type: string
          format: date-time
          example: "2025-03-12T14:30:00Z"
          description: Format year-month-dateThour:minutes:secondsTimeZone